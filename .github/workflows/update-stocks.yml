name: Update Stocks Data

on:
  schedule:
    - cron: '0 1 * * *'   # 1:00 AM UTC daily — offset from crypto to avoid conflicts
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 5h hard cap — fails cleanly rather than hanging

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install \
            yfinance \
            requests \
            pandas \
            numpy \
            finvizfinance

      - name: Run Stock Analysis
        run: python calculate_stocks.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          git add data/

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "Stocks Update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
