name: Update Financial Data

on:
  schedule:
    - cron: '0 22 * * *' # Runs every day at 10 PM UTC
  workflow_dispatch: # Allows you to run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is crucial for the script to save the JSON files
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run Calculations
        run: |
          python calculate_stocks.py
          python calculate_crypto.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks_valuations.json crypto_valuations.json
          git commit -m "Auto-update valuations" || exit 0
          git push
