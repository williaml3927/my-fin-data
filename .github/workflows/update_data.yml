name: Update Financial Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install \
            yfinance \
            requests \
            pandas \
            numpy \
            finvizfinance

      - name: Run Stock Analysis
        run: python calculate_stocks.py

      - name: Run Crypto Analysis
        run: python calculate_crypto.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/stocks_*.json data/ticker_map.json         || true
          git add data_crypto/crypto_*.json data_crypto/ticker_map.json || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Automated Data Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
