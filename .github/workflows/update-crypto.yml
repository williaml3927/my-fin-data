name: Update Crypto Data

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC daily — 2h after stocks starts
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180    # 3h hard cap — pipeline should comfortably finish in ~90 mins

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install \
            requests \
            pandas \
            numpy

      - name: Run Crypto Analysis
        run: python calculate_crypto.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          git add data_crypto/*.json || true

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "Crypto Update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
