name: Update Crypto Data

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC daily — 2h after stocks starts
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180    # 3h hard cap — pipeline should comfortably finish in ~90 mins

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install \
            requests \
            pandas \
            numpy

      - name: Run Crypto Analysis
        run: python calculate_crypto.py

      - name: Verify output files exist
        run: |
          echo "=== data_crypto/ contents ==="
          ls -la data_crypto/ || echo "ERROR: data_crypto/ folder does not exist"
          echo "=== File count ==="
          find data_crypto/ -name "*.json" 2>/dev/null | wc -l || echo "0 files found"
          echo "=== ticker_map entries ==="
          python3 -c "
          import json, sys
          try:
              with open('data_crypto/ticker_map.json') as f:
                  m = json.load(f)
              print(f'ticker_map.json has {len(m)} entries')
              if len(m) == 0:
                  print('ERROR: ticker_map is empty — pipeline produced no results')
                  sys.exit(1)
          except FileNotFoundError:
              print('ERROR: ticker_map.json not found — pipeline may have crashed')
              sys.exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          # Add entire data_crypto folder — using a glob (data_crypto/*.json)
          # fails silently if the folder doesn't exist yet in the repo because
          # the shell expands the glob before git runs and finds nothing.
          # Using the folder path directly works whether or not it existed before.
          git add data_crypto/

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "Crypto Update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
