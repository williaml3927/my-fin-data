name: Update Market Headlines

on:
  schedule:
    # Runs at 7:00 AM UTC daily (8:00 AM BST / 3:00 AM EST)
    # Headlines are ready before US and European markets open
    - cron: '0 7 * * 1-5'   # Weekdays only (Mon-Fri)
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab

jobs:
  update-headlines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run market headlines pipeline
        env:
          BENZINGA_API_KEY:  ${{ secrets.BENZINGA_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
          NEWSAPI_KEY:       ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT:            ${{ secrets.GH_PAT }}
        run: python market_news.py
