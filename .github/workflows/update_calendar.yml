name: Update Economic Calendar

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday at 6am UTC (before markets open)
  workflow_dispatch:        # Allows you to run it manually from GitHub

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run calendar pipeline
        run: python calculate_calendar.py

      - name: Commit and push updated calendar
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_calendar/
          git diff --staged --quiet || git commit -m "Update economic calendar $(date +'%Y-%m-%d')"
          git push
